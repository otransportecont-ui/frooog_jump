<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frooog Jump</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

canvas {
    display: block;
}

#score {
    position: fixed;
    top: 15px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
}

#gyroButton {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: orange;
    color: white;
    z-index: 20;
}
</style>
</head>
<body>

<div id="score">0</div>
<button id="gyroButton">Включить управление наклоном</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const gyroButton = document.getElementById("gyroButton");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.5;
let jumpPower = -15;
let score = 0;
let lastPlatformY = 0;

let background = new Image();
background.src = "background.png"; // ← ФОН

let player_stand = new Image();
player_stand.src = "player_stand.png"; // ← ПЕРСОНАЖ НА ПЛАТФОРМЕ

let player_fly = new Image();
player_fly.src = "player_fly.png"; // ← ПЕРСОНАЖ В ПРЫЖКЕ

let player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    width: 50,
    height: 50,
    velocityY: 0,
    velocityX: 0,
    facing: 1 // 1 = вправо, -1 = влево
};

let platforms = [];
let platformWidth = 80;
let platformHeight = 15;
let platformGap = 120;

class Platform {
    constructor(x, y, type="static") {
        this.x = x;
        this.y = y;
        this.width = platformWidth;
        this.height = platformHeight;
        this.type = type;
        this.broken = false;
        this.direction = 1;
    }

    update() {
        if (this.type === "moving") {
            this.x += 2 * this.direction;
            if (this.x <= 0 || this.x + this.width >= canvas.width) {
                this.direction *= -1;
            }
        }
    }

    draw() {
        if (this.type === "static") ctx.fillStyle = "green";
        if (this.type === "moving") ctx.fillStyle = "orange";
        if (this.type === "break") ctx.fillStyle = "red";

        if (!this.broken) {
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
}

function createPlatforms() {
    platforms = [];
    let y = canvas.height;
    while (y > 0) {
        let x = Math.random() * (canvas.width - platformWidth);
        platforms.push(new Platform(x, y));
        y -= platformGap;
    }
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ФОН
    ctx.drawImage(background, 0, 0, canvas.width, canvas.height);

    player.velocityY += gravity;
    player.y += player.velocityY;
    player.x += player.velocityX;

    if (player.velocityX > 0) player.facing = 1;
    if (player.velocityX < 0) player.facing = -1;

    if (player.x > canvas.width) player.x = 0;
    if (player.x < 0) player.x = canvas.width;

    platforms.forEach(platform => {
        platform.update();

        if (
            player.velocityY > 0 &&
            player.x + player.width > platform.x &&
            player.x < platform.x + platform.width &&
            player.y + player.height > platform.y &&
            player.y + player.height < platform.y + platform.height &&
            !platform.broken
        ) {
            player.velocityY = jumpPower;

            if (platform.y < lastPlatformY || lastPlatformY === 0) {
                score++;
                scoreDisplay.innerText = score;
                lastPlatformY = platform.y;
            }

            if (platform.type === "break") {
                platform.broken = true;
            }
        }

        platform.draw();
    });

    // камера
    if (player.y < canvas.height / 2) {
        let diff = canvas.height / 2 - player.y;
        player.y = canvas.height / 2;

        platforms.forEach(platform => {
            platform.y += diff;
            if (platform.y > canvas.height) {
                platform.y = 0;
                platform.x = Math.random() * (canvas.width - platformWidth);
            }
        });
    }

    // СПРАЙТ
    ctx.save();
    ctx.translate(player.x + player.width/2, player.y + player.height/2);
    ctx.scale(player.facing, 1);

    let sprite = player.velocityY > 0 ? playerFly : playerStand;

    ctx.drawImage(
        sprite,
        -player.width/2,
        -player.height/2,
        player.width,
        player.height
    );

    ctx.restore();

    if (player.y > canvas.height) {
        alert("Game Over! Score: " + score);
        location.reload();
    }

    requestAnimationFrame(update);
}

// iOS гироскоп
gyroButton.addEventListener("click", () => {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
                if (permissionState === "granted") {
                    window.addEventListener("deviceorientation", handleOrientation);
                    gyroButton.style.display = "none";
                }
            })
            .catch(console.error);
    } else {
        window.addEventListener("deviceorientation", handleOrientation);
        gyroButton.style.display = "none";
    }
});

function handleOrientation(event) {
    let tilt = event.gamma;
    player.velocityX = tilt * 0.3;
}

let imagesLoaded = 0;

function checkStart() {
    imagesLoaded++;
    if (imagesLoaded === 3) {
        createPlatforms();
        update();
    }
}

background.onload = checkStart;
playerStand.onload = checkStart;
playerFly.onload = checkStart;
</script>
</body>
</html>
