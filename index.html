<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frooog Jump</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
}

#score{
position:fixed;
top:15px;
left:20px;
font-size:24px;
font-weight:bold;
color:white;
text-shadow:2px 2px 4px black;
z-index:10;
}

#gyroButton{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
font-size:18px;
border-radius:10px;
border:none;
background:orange;
color:white;
z-index:20;
}
</style>
</head>

<body>

<div id="score">0</div>
<button id="gyroButton">Использовать наклоны</button>
<canvas id="gameCanvas"></canvas>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const scoreDisplay=document.getElementById("score");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gravity=0.5;
let jumpPower=-15;

let score=0;
let gameState="start";

let platformWidth=80;
let platformHeight=15;
let platformGap=120;

let platforms=[];

// изображения
let background=new Image();
background.src="background.png";

let player_stand=new Image();
player_stand.src="player_stand.png";

let player_fly=new Image();
player_fly.src="player_fly.png";

let player_flyd=new Image();
player_flyd.src="player_flyd.png";

// игрок
let player={
x:0,
y:0,
width:50,
height:50,
velocityX:0,
velocityY:0,
onGround:false
};

function resetPlayer(){

player.x=canvas.width/2;
player.y=canvas.height-150;

player.velocityX=0;
player.velocityY=0;

player.onGround=false;

}

// платформа
class Platform{

constructor(x,y,type="static"){

this.x=x;
this.y=y;
this.width=platformWidth;
this.height=platformHeight;

this.type=type;
this.broken=false;
this.direction=1;

}

update(){

if(this.type==="moving"){

this.x+=2*this.direction;

if(this.x<=0||this.x+this.width>=canvas.width){

this.direction*=-1;

}

}

}

draw(){

if(this.broken)return;

if(this.type==="static")ctx.fillStyle="#4CAF50";
if(this.type==="moving")ctx.fillStyle="#FF9800";
if(this.type==="break")ctx.fillStyle="#f44336";

ctx.fillRect(this.x,this.y,this.width,this.height);

}

}

// генерация платформ
function createPlatforms(){

platforms=[];

let y=canvas.height-50;

platforms.push(new Platform(canvas.width/2-40,y));

while(y>-canvas.height){

let x=Math.random()*(canvas.width-platformWidth);

let type="static";

let r=Math.random();

if(r>0.8)type="moving";
if(r>0.9)type="break";

platforms.push(new Platform(x,y,type));

y-=platformGap;

}

}

// полный перезапуск игры
function startNewGame(){

score=0;
scoreDisplay.innerText=score;

resetPlayer();

createPlatforms();

}

// стартовый экран
function drawStart(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(background.complete){

ctx.drawImage(background,0,0,canvas.width,canvas.height);

}

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="bold 48px Arial";
ctx.fillText("Frooog Jump",canvas.width/2,canvas.height/2-80);

ctx.font="bold 36px Arial";
ctx.fillText("Играть",canvas.width/2,canvas.height/2);

}

// экран проигрыша
function drawGameOver(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(background.complete){

ctx.drawImage(background,0,0,canvas.width,canvas.height);

}

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="bold 48px Arial";
ctx.fillText("Вы проиграли",canvas.width/2,canvas.height/2-100);

ctx.font="24px Arial";
ctx.fillText("Ваш счет: "+score,canvas.width/2,canvas.height/2-40);

ctx.font="bold 36px Arial";
ctx.fillText("Заново",canvas.width/2,canvas.height/2+60);

}

// обновление игры
function update(){

if(gameState==="start"){

drawStart();
requestAnimationFrame(update);
return;

}

if(gameState==="gameover"){

drawGameOver();
requestAnimationFrame(update);
return;

}

ctx.clearRect(0,0,canvas.width,canvas.height);

if(background.complete){

ctx.drawImage(background,0,0,canvas.width,canvas.height);

}

// физика
player.velocityY+=gravity;

player.y+=player.velocityY;
player.x+=player.velocityX;

if(player.x<0)player.x=0;
if(player.x>canvas.width-player.width)player.x=canvas.width-player.width;

player.onGround=false;

// платформы
platforms.forEach(p=>{

p.update();

if(
player.velocityY>0 &&
player.x+player.width>p.x &&
player.x<p.x+p.width &&
player.y+player.height>p.y &&
player.y+player.height<p.y+20 &&
!p.broken
){

player.velocityY=jumpPower;

player.onGround=true;

if(p.type==="break")p.broken=true;

}

p.draw();

});

// камера
if(player.y<canvas.height/3){

let diff=canvas.height/3-player.y;

player.y=canvas.height/3;

platforms.forEach(p=>{

p.y+=diff;

if(p.y>canvas.height){

p.y=-platformHeight;

p.x=Math.random()*(canvas.width-platformWidth);

p.broken=false;

}

});

score+=Math.floor(diff/10);
scoreDisplay.innerText=score;

}

// игрок
let sprite=player_stand;

if(!player.onGround){

if(player.velocityY>0)sprite=player_flyd;
else sprite=player_fly;

}

ctx.drawImage(sprite,player.x,player.y,50,50);

// смерть
if(player.y>canvas.height){

gameState="gameover";

}

requestAnimationFrame(update);

}

// управление
window.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft")player.velocityX=-8;
if(e.key==="ArrowRight")player.velocityX=8;

});

window.addEventListener("keyup",()=>{

player.velocityX=0;

});

// клики
canvas.addEventListener("click",e=>{

let x=e.clientX;
let y=e.clientY;

if(gameState==="start"){

gameState="playing";
startNewGame();

}

else if(gameState==="gameover"){

gameState="playing";
startNewGame();

}

});

// старт
startNewGame();
update();

// resize
window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
