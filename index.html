<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Лягуха</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial}
canvas{display:block}

#score{
position:fixed;
top:15px;
left:20px;
font-size:24px;
font-weight:bold;
color:white;
text-shadow:2px 2px 4px black;
z-index:10;
}

#gyroButton{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
font-size:18px;
border-radius:10px;
border:none;
background:orange;
color:white;
z-index:20;
}
</style>
</head>

<body>

<div id="score">0</div>
<button id="gyroButton">Включить управление наклонами</button>
<canvas id="gameCanvas"></canvas>

<script>

window.onerror=(m)=>console.error("Ошибка:",m)

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")
const scoreDisplay=document.getElementById("score")
const gyroButton=document.getElementById("gyroButton")

const W=()=>canvas.width
const H=()=>canvas.height

canvas.width=innerWidth
canvas.height=innerHeight

/* =========================
ШРИФТЫ
========================= */

let gameFont="bold 48px Arial"
let buttonFont="bold 36px Arial"
let smallFont="24px Arial"

function setGameFont(font){
gameFont=`bold 60px ${font}`
buttonFont=`bold 36px ${font}`
smallFont=`24px ${font}`
}

/* =========================
ГЛОБАЛ
========================= */

let gravity=.5
let jumpPower=-15
let score=0
let gameStarted=false
let gameState="start"

/* =========================
ЗАГРУЗКА ИЗОБРАЖЕНИЙ
========================= */

const images={
background:new Image(),
stand:new Image(),
fly:new Image(),
fly_left:new Image(),
flyd:new Image(),
flyd_left:new Image()
}

images.background.src="background.png"
images.stand.src="player_stand.png"
images.fly.src="player_fly.png"
images.fly_left.src="player_fly_left.png"
images.flyd.src="player_flyd.png"
images.flyd_left.src="player_flyd_left.png"

/* =========================
ИГРОК
========================= */

const player={
x:W()/2,
y:H()-100,
width:50,
height:50,
velocityX:0,
velocityY:0,
facing:1,
onGround:false
}

function resetPlayer(){
player.x=W()/2
player.y=H()-100
player.velocityX=0
player.velocityY=0
player.onGround=false
player.facing=1
}

/* =========================
ПЛАТФОРМЫ
========================= */

let platforms=[]
const platformWidth=80
const platformHeight=15
const platformGap=120

class Platform{

constructor(x,y,type="static"){
this.x=x
this.y=y
this.width=platformWidth
this.height=platformHeight
this.type=type
this.broken=false
this.direction=1
}

update(){

if(this.type==="moving"){

const speed = Math.min(2 + score * 0.003, 12)

this.x+=speed*this.direction

if(this.x<=0||this.x+this.width>=W())
this.direction*=-1
}
}

draw(){

if(this.broken)return

const colors={
static:"#4CAF50",
moving:"#FF9800",
break:"#f44336"
}

ctx.fillStyle=this.type==="break"&&this.broken?"#999":colors[this.type]

ctx.fillRect(this.x,this.y,this.width,this.height)

ctx.strokeStyle="#333"
ctx.lineWidth=2
ctx.strokeRect(this.x,this.y,this.width,this.height)
}
}

/* =========================
ПРОВЕРКА ПЕРЕКРЫТИЯ
========================= */

function overlapsPlatform(x,y){

for(const p of platforms){

const sameHeight=Math.abs(p.y-y)<platformHeight
const overlapX=x<p.x+p.width&&x+platformWidth>p.x

if(sameHeight&&overlapX)return true
}

return false
}

/* =========================
ГЕНЕРАЦИЯ ПЛАТФОРМ
========================= */
function getPlatformType(){

let difficulty = Math.min(Math.max((score - 500) / 6000, 0), 1)

let staticChance = 0.75 - difficulty * 0.55
let movingChance = 0.15 + difficulty * 0.20
let breakChance = 0.10 + difficulty * 0.35

let r = Math.random()

if (r < breakChance) return "break"
if (r < breakChance + movingChance) return "moving"

return "static"
}


function createPlatforms(){

platforms=[]

let y=H()-50

platforms.push(new Platform(W()/2-platformWidth/2,H()-50,"static"))

let hasMoving = false
let hasBreak = false
while(y>-platformGap){

let x
let attempts=0

do{
x=Math.random()*(W()-platformWidth)
attempts++
}
while(overlapsPlatform(x,y)&&attempts<10)

let type = getPlatformType()

if(type === "moving") hasMoving = true
if(type === "break") hasBreak = true

platforms.push(new Platform(x,y,type))

y-=platformGap
}
}

/* =========================
ФОН
========================= */

function drawBackground(){

if(images.background.complete&&images.background.naturalHeight){

ctx.drawImage(images.background,0,0,W(),H())

}else{

const g=ctx.createLinearGradient(0,0,0,H())
g.addColorStop(0,"#87CEEB")
g.addColorStop(1,"#E0F7FA")

ctx.fillStyle=g
ctx.fillRect(0,0,W(),H())
}
}

/* =========================
ЭКРАНЫ
========================= */

function drawStart(){

ctx.clearRect(0,0,W(),H())
drawBackground()

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font=gameFont
ctx.fillText("Лягуха",W()/2,H()/2-80)

ctx.font=buttonFont
ctx.fillText("Играть",W()/2,H()/2)
}

function drawGameOver(){

ctx.clearRect(0,0,W(),H())
drawBackground()

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font=buttonFont
ctx.fillText("Приходите",W()/2,H()/2-140)
ctx.fillText("на нашу постановку",W()/2,H()/2-100)
ctx.fillText("21 марта в 11:00",W()/2,H()/2-60)

ctx.font=smallFont
ctx.fillText("Ваш счет: "+score,W()/2,H()/2-10)

ctx.font=buttonFont
ctx.fillText("Заново",W()/2,H()/2+70)

}

/* =========================
РИСОВКА ИГРОКА
========================= */

function drawPlayer(){

ctx.save()

ctx.translate(player.x+player.width/2,player.y+player.height/2)
ctx.scale(player.facing,1)

let sprite

if(player.onGround)sprite=images.stand
else if(player.velocityY>0)
sprite=player.velocityX>=0?images.flyd:images.flyd_left
else
sprite=player.velocityX>=0?images.fly:images.fly_left

if(sprite.complete&&sprite.naturalHeight){

ctx.drawImage(sprite,-player.width/2,-player.height/2,player.width,player.height)

}else{

ctx.fillStyle=player.onGround?"#4CAF50":"#2196F3"
ctx.fillRect(-player.width/2,-player.height/2,player.width,player.height)

ctx.fillStyle="#fff"
ctx.font="12px Arial"
ctx.fillText("🐸",-10,5)
}

ctx.restore()
}

/* =========================
ОБНОВЛЕНИЕ
========================= */

function update(){

if(gameState==="start"){drawStart();return requestAnimationFrame(update)}
if(gameState==="gameover"){drawGameOver();return requestAnimationFrame(update)}

ctx.clearRect(0,0,W(),H())
drawBackground()

/* ФИЗИКА */

player.velocityY+=gravity
player.y+=player.velocityY
player.x+=player.velocityX

player.x=Math.max(0,Math.min(W()-player.width,player.x))

player.onGround=false

for(const p of platforms){

p.update()

if(
player.velocityY>0 &&
player.x+player.width>p.x &&
player.x<p.x+p.width &&
player.y+player.height>p.y &&
player.y+player.height<p.y+p.height+player.velocityY &&
!p.broken
){

player.velocityY=jumpPower
player.onGround=true

if(p.type==="break")p.broken=true
}

p.draw()
}

/* КАМЕРА */

if(player.y<H()/3){

const diff=H()/3-player.y

score+=Math.floor(diff/10)
scoreDisplay.innerText=score

player.y=H()/3

for(const p of platforms){

p.y+=diff

if(p.y>H()){

let attempts=0

do{
p.x=Math.random()*(W()-platformWidth)
attempts++
}
while(overlapsPlatform(p.x,p.y)&&attempts<10)

p.y=-platformHeight
p.broken=false

/* НОВЫЙ СЛУЧАЙНЫЙ ТИП */
p.type = getPlatformType()

}
}
}

drawPlayer()

if(player.y>H())gameState="gameover"

requestAnimationFrame(update)
}

/* =========================
ГИРОСКОП
========================= */

gyroButton.onclick=()=>{

if(typeof DeviceOrientationEvent.requestPermission==="function"){

DeviceOrientationEvent.requestPermission()
.then(p=>{
if(p==="granted"){
window.addEventListener("deviceorientation",handleOrientation)
gyroButton.style.display="none"
}
})

}else{

window.addEventListener("deviceorientation",handleOrientation)
gyroButton.style.display="none"
}
}

function handleOrientation(e){
if(e.gamma!==null)player.velocityX=e.gamma*.4
}

/* =========================
КЛАВИАТУРА
========================= */

addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")player.velocityX=-8
if(e.key==="ArrowRight")player.velocityX=8
if(e.key===" "&&player.onGround)player.velocityY=jumpPower
})

addEventListener("keyup",e=>{
if(e.key==="ArrowLeft"||e.key==="ArrowRight")player.velocityX=0
})

/* =========================
КЛИКИ
========================= */

canvas.addEventListener("click",e=>{

const x=e.clientX
const y=e.clientY

if(gameState==="start"){

if(x>W()/2-150&&x<W()/2+150&&y>H()/2-50&&y<H()/2+50){

gameState="playing"
score=0
scoreDisplay.innerText=score

resetPlayer()
createPlatforms()
}
}

if(gameState==="gameover"){

if(x>W()/2-150&&x<W()/2+150&&y>H()/2&&y<H()/2+100){

score=0
scoreDisplay.innerText=score

resetPlayer()
createPlatforms()

gameState="playing"
}
}
})

/* =========================
ЗАГРУЗКА
========================= */

let loaded=0
const total=Object.keys(images).length

function checkStart(){

loaded++

if(loaded>=total&&!gameStarted){

gameStarted=true
gameState="start"

createPlatforms()
update()
}
}

Object.values(images).forEach(img=>{
img.onload=checkStart
img.onerror=checkStart
})

/* =========================
RESIZE
========================= */

addEventListener("resize",()=>{
canvas.width=innerWidth
canvas.height=innerHeight
})

</script>

</body>
</html>
